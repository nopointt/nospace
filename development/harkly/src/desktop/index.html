<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harkly Desktop</title>
</head>

<body class="bg-transparent text-white">
    <div id="root"></div>
    <div id="startup-error" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:black; color:red; padding:20px; z-index:9999; overflow:auto; font-family:monospace;">
        <h2>Startup Error</h2>
        <pre id="error-text"></pre>
    </div>
    <script>
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            var container = document.getElementById('startup-error');
            var text = document.getElementById('error-text');
            container.style.display = 'block';
            text.innerText = "Msg: " + msg + "\nUrl: " + url + "\nLine: " + lineNo + "\nStack:\n" + (error ? error.stack : 'no stack');
            return false;
        };
        // Catch promise rejections
        window.addEventListener('unhandledrejection', function (event) {
            var container = document.getElementById('startup-error');
            var text = document.getElementById('error-text');
            container.style.display = 'block';
            text.innerText = "Unhandled Rejection: " + event.reason + "\nStack:\n" + (event.reason ? event.reason.stack : 'no stack');
        });
    </script>
    <script type="module" src="./src/main.tsx"></script>
</body>

</html>
