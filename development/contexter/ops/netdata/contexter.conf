# Contexter custom Netdata alerts
# Deployed to: /etc/netdata/health.d/contexter.conf (inside netdata container)
# Complements default ram.conf, disks.conf, cpu.conf

# ---------------------------------------------------------------------------
# Disk space alert (40GB NVMe, pg-data + R2 cache can fill it)
# ---------------------------------------------------------------------------

    alarm: contexter_disk_space
       on: disk.space
   lookup: average -1m of used
    units: %
    every: 1m
     calc: $used * 100 / ($avail + $used)
     warn: $this > 80
     crit: $this > 90
    delay: down 5m multiplier 1.5 max 1h
  summary: Disk usage ${chartvar:disk}
     info: Disk ${chartvar:disk} usage is high — pg-data or R2 cache may be filling up
       to: sysadmin

# ---------------------------------------------------------------------------
# CPU sustained alert (Docling + NLI + Bun compete for 2 vCPUs)
# ---------------------------------------------------------------------------

    alarm: contexter_cpu_sustained
       on: system.cpu
   lookup: average -5m unaligned of user,system,softirq,irq
    units: %
    every: 1m
     warn: $this > 80
     crit: $this > 95
    delay: down 5m multiplier 1.5 max 1h
  summary: Sustained CPU usage
     info: CPU sustained above threshold for 5 minutes — possible pipeline saturation
       to: sysadmin

# ---------------------------------------------------------------------------
# Docker containers — enable down alerts for all Contexter containers
# ---------------------------------------------------------------------------

    template: contexter_container_down
          on: docker.container_state
       class: Errors
        type: Containers
   component: Docker
chart labels: container_name=contexter*
       units: status
       every: 10s
      lookup: average -10s of exited
        warn: $this > 0
       delay: down 1m multiplier 1.5 max 2h
     summary: Container ${label:container_name} is DOWN
        info: Contexter container ${label:container_name} is not running
          to: sysadmin

# ---------------------------------------------------------------------------
# OOM kill detection
# ---------------------------------------------------------------------------

    alarm: contexter_oom_kill
       on: mem.oom_kill
   lookup: sum -5m unaligned
    units: kills
    every: 1m
     warn: $this > 0
  summary: OOM kills detected
     info: ${this} OOM kills in last 5 minutes — Docling or NLI sidecar likely exceeded memory
       to: sysadmin

# ---------------------------------------------------------------------------
# Swap usage
# ---------------------------------------------------------------------------

    alarm: contexter_swap_usage
       on: system.swap
    units: %
    every: 1m
     calc: $used * 100 / ($free + $used)
     warn: $this > 50
     crit: $this > 80
    delay: down 5m multiplier 1.5 max 1h
  summary: High swap usage
     info: Swap usage at ${this}% — likely RAM over-commitment under load
       to: sysadmin
