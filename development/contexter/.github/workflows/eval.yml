name: Golden Set Eval

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Run golden set evaluation
        run: bun run evaluation/run-eval.ts --api-url ${{ secrets.EVAL_API_URL }} --token ${{ secrets.EVAL_TOKEN }}
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
