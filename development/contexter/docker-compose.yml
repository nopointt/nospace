services:
  app:
    image: contexter-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    mem_limit: 1536m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    mem_limit: 1536m
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 320mb --maxmemory-policy noeviction
    mem_limit: 384m
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - ./certs:/etc/caddy/certs:ro
    networks:
      - internal

  docling:
    image: quay.io/docling-project/docling-serve:latest
    restart: unless-stopped
    mem_limit: 3072m
    networks:
      - internal

  netdata:
    image: netdata/netdata:stable
    restart: unless-stopped
    # Port 19999 NOT exposed publicly — access via Caddy reverse proxy with auth
    mem_limit: 256m
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
    networks:
      - internal

  nli-sidecar:
    build:
      context: ./services/nli-sidecar
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HF_HOME: /app/models
    volumes:
      - nli-models:/app/models
    mem_limit: 1536m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - internal

volumes:
  pg-data:
    name: contexter_pg_data
    external: true
  redis-data:
    name: contexter_redis_data
    external: true
  caddy-data:
    name: contexter_caddy_data
    external: true
  netdata-config:
  netdata-lib:
  netdata-cache:
  nli-models:

networks:
  internal:
    driver: bridge
