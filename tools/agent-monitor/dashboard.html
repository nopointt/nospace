<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Monitor Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #00d9ff;
            font-size: 2rem;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .panel {
            background: #16213e;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 2px solid #0f3460;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #0f3460;
        }
        .panel-title {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-active {
            background: #00c853;
            color: #000;
        }
        .status-idle {
            background: #ff9800;
            color: #000;
        }
        .log-output {
            background: #0d1117;
            border-radius: 5px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .log-line {
            white-space: pre-wrap;
            word-break: break-word;
            padding: 2px 0;
            border-bottom: 1px solid #1f2937;
        }
        .log-line:last-child {
            border-bottom: none;
        }
        .timestamp {
            color: #6b7280;
            font-size: 0.75rem;
        }
        .last-update {
            font-size: 0.75rem;
            color: #888;
            margin-top: 10px;
            text-align: right;
        }
        .no-logs {
            color: #6b7280;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
        .refresh-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🤖 Agent Monitor Dashboard</h1>
    <div class="refresh-indicator">Auto-refresh: every 2s</div>
    
    <div class="dashboard">
        <div class="panel" id="panel-qwen">
            <div class="panel-header">
                <span class="panel-title">Qwen</span>
                <span class="status status-idle" id="status-qwen">IDLE</span>
            </div>
            <div class="log-output" id="logs-qwen">
                <div class="no-logs">No logs yet</div>
            </div>
            <div class="last-update" id="update-qwen"></div>
        </div>

        <div class="panel" id="panel-opencode">
            <div class="panel-header">
                <span class="panel-title">OpenCode</span>
                <span class="status status-idle" id="status-opencode">IDLE</span>
            </div>
            <div class="log-output" id="logs-opencode">
                <div class="no-logs">No logs yet</div>
            </div>
            <div class="last-update" id="update-opencode"></div>
        </div>

        <div class="panel" id="panel-gemini">
            <div class="panel-header">
                <span class="panel-title">Gemini</span>
                <span class="status status-idle" id="status-gemini">IDLE</span>
            </div>
            <div class="log-output" id="logs-gemini">
                <div class="no-logs">No logs yet</div>
            </div>
            <div class="last-update" id="update-gemini"></div>
        </div>
    </div>

    <script>
        const AGENTS = ['qwen', 'opencode', 'gemini'];

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString();
        }

        function formatLastUpdate(timestamp) {
            if (!timestamp) return '';
            const now = Date.now();
            const diff = Math.floor((now - timestamp) / 1000);
            if (diff < 5) return 'Just now';
            if (diff < 60) return `${diff}s ago`;
            const mins = Math.floor(diff / 60);
            return `${mins}m ago`;
        }

        function updatePanel(agent) {
            fetch(`/logs/${agent}`)
                .then(res => res.json())
                .then(data => {
                    const statusEl = document.getElementById(`status-${agent}`);
                    const logsEl = document.getElementById(`logs-${agent}`);
                    const updateEl = document.getElementById(`update-${agent}`);

                    // Update status
                    statusEl.textContent = data.status;
                    statusEl.className = `status ${data.status === 'ACTIVE' ? 'status-active' : 'status-idle'}`;

                    // Update logs
                    if (data.lines && data.lines.length > 0) {
                        logsEl.innerHTML = data.lines.map(line => 
                            `<div class="log-line">${escapeHtml(line)}</div>`
                        ).join('');
                        logsEl.scrollTop = logsEl.scrollHeight;
                    } else {
                        logsEl.innerHTML = '<div class="no-logs">No logs yet</div>';
                    }

                    // Update timestamp
                    updateEl.textContent = `Last update: ${formatLastUpdate(data.lastUpdate)}`;
                })
                .catch(err => {
                    console.error(`Error fetching ${agent} logs:`, err);
                });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function refreshAll() {
            AGENTS.forEach(agent => updatePanel(agent));
        }

        // Initial load
        refreshAll();

        // Auto-refresh every 2 seconds
        setInterval(refreshAll, 2000);
    </script>
</body>
</html>
